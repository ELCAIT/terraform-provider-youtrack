# before starting the please run the following instructions
# mkdir -p youtrack-conf youtrack-backups youtrack-data youtrack-logs
# chmod -R 750 youtrack-*
# sudo chown -R 13001:13001 youtrack-*
# then you can start the container with
# docker-compose up -d
# and stop it with
# docker-compose down

services:
  youtrack:
    image: "jetbrains/youtrack:2026.1.13712"
    ports:
      - "8080:8080"
    environment:
      - TZ="Europe/Zurich"
      - LANG="de_CH.UTF-8"
      - LC_TIME="de_CH.UTF-8"
    volumes:
      - ./youtrack-conf:/opt/youtrack/conf
      - ./youtrack-backups:/opt/youtrack/backups
      - ./youtrack-data:/opt/youtrack/data
      - ./youtrack-logs:/opt/youtrack/logs
